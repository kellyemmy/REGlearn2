<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RegLearn — Enterprise Pricing</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans selection:bg-yellow-200">

<nav class="flex justify-between items-center px-8 py-5 bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <h1 class="text-2xl font-black tracking-tight text-blue-900">
        Reg<span class="text-yellow-500">Learn</span>
    </h1>

    <div class="hidden md:flex space-x-6 items-center">
        <button class="text-blue-900 font-semibold hover:text-blue-700 transition">Login</button>
        <button class="bg-blue-800 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-blue-900 transition shadow border-b-2 border-yellow-500 active:scale-95">
            Get Started
        </button>
    </div>
</nav>

<section class="text-center py-16 px-4 bg-white border-b border-gray-100">
    <h1 class="text-4xl md:text-5xl font-extrabold text-blue-900 mb-4">
        Enterprise Learning, Simplified.
    </h1>
    <p class="text-gray-500 text-lg max-w-2xl mx-auto">
        Flexible, scalable plans tailored for your organization.
    </p>
</section>

<main class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8 px-6 pb-24 pt-10">

<!-- LEFT -->
<div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">

<h2 class="text-xl font-bold text-blue-900 mb-8 flex items-center gap-3">
<span class="bg-blue-100 text-blue-800 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
Configure Your Plan
</h2>

<div class="mb-10">
<div class="flex justify-between items-end mb-4">
<label class="font-semibold text-gray-700">Number of Users</label>
<span id="userDisplay" class="text-2xl font-bold text-blue-800 bg-blue-50 px-4 py-1 rounded-lg border">20</span>
</div>

<input id="userSlider" type="range" min="2" max="100" value="20" class="w-full">

<div class="flex justify-between text-xs text-gray-400 mt-3">
<span>2</span>
<span>100+</span>
</div>
</div>

<div class="p-5 bg-gray-50 rounded-xl border">
<div class="flex justify-between items-center">

<div>
<p class="font-bold text-gray-800">Billing Cycle</p>
<p class="text-sm text-gray-500">Save 20% annually</p>
</div>

<label class="flex items-center cursor-pointer">
<span class="mr-3 text-sm text-gray-600">Monthly</span>

<div class="relative">
<input type="checkbox" id="billingToggle" class="sr-only">
<div class="toggle-bg w-12 h-7 bg-gray-300 rounded-full transition"></div>
<div class="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition shadow"></div>
</div>

<span class="ml-3 text-sm font-bold text-yellow-600">Yearly</span>
</label>

</div>
</div>

</div>

<!-- RIGHT -->
<div class="bg-blue-900 p-8 rounded-2xl shadow-2xl text-white relative overflow-hidden border-t-4 border-yellow-500">

<div class="relative z-10">

<h2 id="planName" class="text-sm font-bold text-yellow-500 uppercase mb-2">
Team Plan
</h2>

<h3 class="text-2xl font-bold mb-6">Your Plan Summary</h3>

<!-- PRICE -->
<div id="pricingSection">
<div class="flex items-end gap-2 mb-1">
<span id="summaryPrice" class="text-5xl font-extrabold">$600</span>
<span id="billingPeriod" class="text-blue-200 text-lg">/month</span>
</div>

<p id="summaryUsersDetail" class="text-blue-300 text-sm mb-6">
For 20 Users
</p>
</div>

<!-- ENTERPRISE -->
<div id="enterpriseSection" class="hidden mb-8">
<p class="text-3xl font-extrabold">Custom Pricing</p>
<p class="text-blue-200 text-sm">Contact sales for tailored pricing</p>
</div>

<hr class="border-blue-800 my-6">

<ul id="featureList" class="space-y-4 text-sm text-blue-100"></ul>

<button id="checkoutBtn"
class="mt-8 w-full bg-yellow-500 text-blue-900 py-3.5 font-bold rounded-lg hover:bg-yellow-400 transition active:scale-95 flex justify-center items-center gap-2">

<span id="btnText">Proceed to Checkout</span>
<span id="loader" class="hidden animate-spin w-4 h-4 border-2 border-blue-900 border-t-transparent rounded-full"></span>

</button>

</div>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
